<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行記錄 - 工業風旅程規劃</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (轉譯 JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#f3f4f6]" style="background-image: radial-gradient(#d1d5db 1px, transparent 0); background-size: 20px 20px;">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ==========================================
        // Local Storage Custom Hook
        // ==========================================
        const useLocalStorageData = (key, initialValue = []) => {
            const [data, setData] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(data) : value;
                    setData(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error("無法儲存至 LocalStorage", error);
                }
            };

            return [data, setValue];
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);

        // ==========================================
        // SVGs 
        // ==========================================
        const Calendar = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const DollarSign = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>;
        const ShoppingBag = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" x2="21" y1="6" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>;
        const Info = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></svg>;
        const Plus = ({size=24, strokeWidth=2, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>;
        const ImageIcon = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;
        const ArrowLeft = ({size=24, strokeWidth=2, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"><line x1="19" x2="5" y1="12" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;
        const Trash2 = ({size=24, strokeWidth=2, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const Edit3 = ({size=24, strokeWidth=2, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>;
        const Camera = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;
        const MapPin = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const Users = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const X = ({size=24, strokeWidth=2, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>;
        const ArrowUp = ({size=24, strokeWidth=2, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="19" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>;
        const ArrowDown = ({size=24, strokeWidth=2, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>;

        // ==========================================
        // UI Components 
        // ==========================================
        const BrutalBox = ({ children, className = '', onClick }) => (
          <div onClick={onClick} className={`border-4 border-black bg-white shadow-[6px_6px_0_0_#000] p-5 mb-6 ${onClick ? 'cursor-pointer active:translate-y-1 active:translate-x-1 active:shadow-[0px_0px_0_0_#000] transition-all' : ''} ${className}`}>
            {children}
          </div>
        );

        const BrutalButton = ({ children, onClick, variant = 'primary', className = '', disabled = false }) => {
          const bg = variant === 'primary' ? 'bg-[#4a044e] text-white hover:bg-[#5f0564]' : 
                     variant === 'danger' ? 'bg-red-600 text-white hover:bg-red-700' : 
                     'bg-[#e5e5e5] text-black hover:bg-gray-300';
          return (
            <button onClick={onClick} disabled={disabled} className={`border-4 border-black font-black p-4 text-lg shadow-[4px_4px_0_0_#000] active:translate-y-1 active:translate-x-1 active:shadow-[0px_0px_0_0_#000] transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed disabled:active:translate-y-0 disabled:active:translate-x-0 disabled:active:shadow-[4px_4px_0_0_#000] ${bg} ${className}`}>
              {children}
            </button>
          );
        };

        const BrutalInput = ({ label, type = "text", value, onChange, placeholder, className = "", step }) => (
          <div className={`mb-4 ${className}`}>
            {label && <label className="block font-black text-black mb-1">{label}</label>}
            <input type={type} step={step} value={value} onChange={onChange} placeholder={placeholder} className="w-full border-4 border-black p-3 font-bold focus:outline-none focus:bg-[#f3e8ff] transition-colors" />
          </div>
        );

        const BrutalTextarea = ({ label, value, onChange, placeholder, className = "" }) => (
          <div className={`mb-4 ${className}`}>
            {label && <label className="block font-black text-black mb-1">{label}</label>}
            <textarea value={value} onChange={onChange} placeholder={placeholder} rows="3" className="w-full border-4 border-black p-3 font-bold focus:outline-none focus:bg-[#f3e8ff] transition-colors resize-none" />
          </div>
        );

        const TopNav = ({ title, onBack, rightAction }) => (
          <div className="sticky top-0 z-40 bg-[#f3f4f6] border-b-4 border-black p-4 flex items-center justify-between shadow-[0_4px_0_0_#000]">
            <div className="flex items-center gap-3">
              {onBack && (
                <button onClick={onBack} className="p-2 border-4 border-black bg-white shadow-[2px_2px_0_0_#000] active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all">
                  <ArrowLeft size={20} strokeWidth={3} />
                </button>
              )}
              <h1 className="font-black text-2xl truncate max-w-[200px]">{title}</h1>
            </div>
            {rightAction && rightAction}
          </div>
        );

        // ==========================================
        // Helper Functions
        // ==========================================
        const getDatesInRange = (startDate, endDate) => {
          const dates = [];
          let currentDate = new Date(startDate);
          const end = new Date(endDate);
          while (currentDate <= end) {
            dates.push(currentDate.toISOString().split('T')[0]);
            currentDate.setDate(currentDate.getDate() + 1);
          }
          return dates;
        };

        const resizeImage = (file, callback) => {
          const reader = new FileReader();
          reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const MAX_WIDTH = 600;
              let width = img.width;
              let height = img.height;
              if (width > MAX_WIDTH) {
                height = Math.round((height *= MAX_WIDTH / width));
                width = MAX_WIDTH;
              }
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              callback(canvas.toDataURL('image/jpeg', 0.6));
            };
            img.src = event.target.result;
          };
          reader.readAsDataURL(file);
        };

        // ==========================================
        // Auto-Save Modals
        // ==========================================
        const ModalWrapper = ({ children, onClose, title, status }) => (
          <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
            <div className="bg-white border-4 border-black w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-[8px_8px_0_0_#4a044e] animate-slide-up sm:animate-none flex flex-col">
              <div className="sticky top-0 bg-white border-b-4 border-black p-4 flex justify-between items-center z-10">
                <div className="flex flex-col sm:flex-row sm:items-center gap-2">
                    <h2 className="font-black text-2xl uppercase tracking-wider">{title}</h2>
                    {status && (
                        <span className={`text-xs font-bold px-2 py-1 border-2 border-black inline-block w-fit ${status === 'saving' ? 'bg-yellow-300' : 'bg-green-300'}`}>
                            {status === 'saving' ? '⏳ 儲存中...' : '☁️ 已自動儲存'}
                        </span>
                    )}
                </div>
                <button onClick={onClose} className="p-2 bg-red-500 text-white border-4 border-black shadow-[2px_2px_0_0_#000] active:translate-y-0.5 active:translate-x-0.5 active:shadow-none transition-all">
                  <X size={24} strokeWidth={3} />
                </button>
              </div>
              <div className="p-5 flex-1">
                {children}
              </div>
            </div>
          </div>
        );

        const TripModal = ({ trip, api, onClose }) => {
          const [docId, setDocId] = useState(trip?.id || null);
          const [name, setName] = useState(trip?.name || '');
          const [startDate, setStartDate] = useState(trip?.startDate || new Date().toISOString().split('T')[0]);
          const [endDate, setEndDate] = useState(trip?.endDate || new Date().toISOString().split('T')[0]);
          const [participantsStr, setParticipantsStr] = useState(trip?.participants?.join(', ') || '');
          
          const [status, setStatus] = useState(trip ? 'saved' : '');
          const isInitial = useRef(true);
          const latestData = useRef(null);

          const performSave = (data) => {
             if (docId) { api.updateTrip(docId, data); } 
             else { const newId = api.addTrip(data); setDocId(newId); }
             setStatus('saved');
          };

          useEffect(() => {
             const parts = participantsStr.split(/[,，]/).map(s => s.trim()).filter(Boolean);
             const data = { name, startDate, endDate, participants: parts, updatedAt: Date.now() };
             latestData.current = data;

             if (isInitial.current) { isInitial.current = false; return; }
             if (!docId && !name && !participantsStr) return; 

             setStatus('saving');
             const timer = setTimeout(() => performSave(data), 600);
             return () => clearTimeout(timer);
          }, [name, startDate, endDate, participantsStr]);

          const handleClose = () => {
             if (status === 'saving' && latestData.current) performSave(latestData.current);
             onClose();
          };

          return (
            <ModalWrapper title={docId ? '編輯旅程' : '新增旅程'} status={status} onClose={handleClose}>
              <BrutalInput label="旅程名稱" value={name} onChange={e => setName(e.target.value)} placeholder="例如：2026 東京硬派之旅" />
              <div className="grid grid-cols-2 gap-4">
                <BrutalInput label="出發日期" type="date" value={startDate} onChange={e => setStartDate(e.target.value)} />
                <BrutalInput label="回程日期" type="date" value={endDate} onChange={e => setEndDate(e.target.value)} />
              </div>
              <BrutalTextarea label="同行人 (請用逗號分隔)" value={participantsStr} onChange={e => setParticipantsStr(e.target.value)} placeholder="小明, 小華, 小美 (後續記帳直接選不需重填)" />
              
              <div className="mt-8 flex flex-col gap-3">
                <BrutalButton onClick={handleClose} variant="secondary" className="w-full">完成並關閉</BrutalButton>
                {docId && <BrutalButton variant="danger" onClick={() => { if(window.confirm("確定刪除整個旅程？")) { api.deleteTrip(docId); onClose(); } }}>刪除旅程</BrutalButton>}
              </div>
            </ModalWrapper>
          );
        };

        const EventModal = ({ event, defaultDate, tripId, dayEvents, api, onClose }) => {
          const [docId, setDocId] = useState(event?.id || null);
          const [date, setDate] = useState(event?.date || defaultDate);
          const [time, setTime] = useState(event?.time || '10:00');
          const [title, setTitle] = useState(event?.title || '');
          const [location, setLocation] = useState(event?.location || '');
          const [notes, setNotes] = useState(event?.notes || '');
          
          const [status, setStatus] = useState(event ? 'saved' : '');
          const isInitial = useRef(true);
          const latestData = useRef(null);

          const performSave = (data) => {
             if (docId) api.updateEvent(docId, data);
             else { const newId = api.addEvent(data); setDocId(newId); }
             setStatus('saved');
          };

          useEffect(() => {
              const orderIndex = event?.orderIndex !== undefined ? event.orderIndex : dayEvents?.length || 0;
              const data = { tripId, date, time, title, location, notes, orderIndex, updatedAt: Date.now() };
              latestData.current = data;

              if (isInitial.current) { isInitial.current = false; return; }
              if (!docId && !title && !location && !notes) return;

              setStatus('saving');
              const timer = setTimeout(() => performSave(data), 600);
              return () => clearTimeout(timer);
          }, [date, time, title, location, notes]);

          const handleClose = () => {
              if (status === 'saving' && latestData.current) performSave(latestData.current);
              onClose();
          };

          return (
            <ModalWrapper title={docId ? '編輯行程' : '新增行程'} status={status} onClose={handleClose}>
              <div className="grid grid-cols-2 gap-4">
                <BrutalInput label="日期 *" type="date" value={date} onChange={e => setDate(e.target.value)} />
                <BrutalInput label="時間 *" type="time" value={time} onChange={e => setTime(e.target.value)} />
              </div>
              <BrutalInput label="行程標題 *" value={title} onChange={e => setTitle(e.target.value)} placeholder="例如：築地市場吃壽司" />
              <BrutalInput label="地點" value={location} onChange={e => setLocation(e.target.value)} placeholder="搜尋或輸入地址..." />
              <BrutalTextarea label="備註" value={notes} onChange={e => setNotes(e.target.value)} placeholder="必吃名單、訂位代號等..." />
              
              <div className="mt-8">
                <BrutalButton onClick={handleClose} variant="secondary" className="w-full">完成並關閉</BrutalButton>
              </div>
            </ModalWrapper>
          );
        };

        const ExpenseModal = ({ trip, api, onClose }) => {
          const tripParts = trip?.participants || [];
          const [docId, setDocId] = useState(null);
          const [title, setTitle] = useState('');
          const [amount, setAmount] = useState('');
          const [currency, setCurrency] = useState('JPY');
          const [rate, setRate] = useState('0.052'); 
          const [payer, setPayer] = useState(tripParts[0] || '');
          const [selectedParts, setSelectedParts] = useState(tripParts); 
          
          const [status, setStatus] = useState('');
          const isInitial = useRef(true);
          const latestData = useRef(null);

          const performSave = (data) => {
              if (docId) api.updateExpense(docId, data);
              else { const newId = api.addExpense(data); setDocId(newId); }
              setStatus('saved');
          };

          useEffect(() => {
              const data = {
                  tripId: trip.id, title, amount: parseFloat(amount) || 0, currency, rate: parseFloat(rate) || 1, 
                  payer, participants: selectedParts, settled: [], updatedAt: Date.now()
              };
              latestData.current = data;

              if (isInitial.current) { isInitial.current = false; return; }
              if (!docId && !title && !amount) return;

              setStatus('saving');
              const timer = setTimeout(() => performSave(data), 600);
              return () => clearTimeout(timer);
          }, [title, amount, currency, rate, payer, selectedParts]);

          const handleClose = () => {
              if (status === 'saving' && latestData.current) performSave(latestData.current);
              onClose();
          };

          const togglePart = (p) => {
            if (selectedParts.includes(p)) setSelectedParts(selectedParts.filter(x => x !== p));
            else setSelectedParts([...selectedParts, p]);
          };

          return (
            <ModalWrapper title="新增帳目" status={status} onClose={handleClose}>
              <BrutalInput label="項目名稱 *" value={title} onChange={e => setTitle(e.target.value)} placeholder="例如：晚餐烤肉" />
              
              <div className="border-4 border-black p-4 bg-[#f3e8ff] mb-4">
                <h4 className="font-black mb-3">金額與匯率</h4>
                <div className="grid grid-cols-2 gap-4">
                  <BrutalInput label="幣別" value={currency} onChange={e => setCurrency(e.target.value)} placeholder="JPY, TWD..." className="!mb-0" />
                  <BrutalInput label={`換港幣(HKD)匯率`} type="number" step="0.001" value={rate} onChange={e => setRate(e.target.value)} className="!mb-0" />
                </div>
                <div className="mt-4">
                  <BrutalInput label="花費金額 (當地貨幣) *" type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="10000" className="!mb-0" />
                </div>
                {amount && rate && (
                  <div className="mt-2 text-right font-bold text-purple-900">
                    約合 HKD ${(parseFloat(amount) * parseFloat(rate)).toFixed(2)}
                  </div>
                )}
              </div>

              <div className="border-4 border-black p-4 bg-gray-100 mb-6">
                <h4 className="font-black mb-3"><Users className="inline" size={18}/> 分帳設定 (點選切換)</h4>
                
                <div className="mb-4">
                  <label className="block font-black text-black mb-2">誰先付款的？ *</label>
                  {tripParts.length > 0 ? (
                    <div className="flex flex-wrap gap-2">
                      {tripParts.map(p => (
                        <button key={p} onClick={() => setPayer(p)} className={`px-3 py-2 border-2 border-black font-black transition-all ${payer === p ? 'bg-black text-white shadow-none translate-y-0.5 translate-x-0.5' : 'bg-white shadow-[2px_2px_0_0_#000]'}`}>
                          {p}
                        </button>
                      ))}
                    </div>
                  ) : (
                     <BrutalInput value={payer} onChange={e => setPayer(e.target.value)} placeholder="輸入名字" className="!mb-0" />
                  )}
                </div>

                <div>
                  <label className="block font-black text-black mb-2">參與分攤的人 *</label>
                  {tripParts.length > 0 ? (
                    <div className="flex flex-wrap gap-2">
                      {tripParts.map(p => {
                        const isSelected = selectedParts.includes(p);
                        return (
                          <button key={p} onClick={() => togglePart(p)} className={`px-3 py-2 border-2 border-black font-black flex items-center gap-1 transition-all ${isSelected ? 'bg-[#4a044e] text-white shadow-none translate-y-0.5 translate-x-0.5' : 'bg-white shadow-[2px_2px_0_0_#000]'}`}>
                            {isSelected ? '☑' : '☐'} {p}
                          </button>
                        );
                      })}
                    </div>
                  ) : (
                    <div className="text-sm font-bold text-red-600">請先在「編輯旅程」中設定同行人名單，即可啟用快速點選功能！</div>
                  )}
                </div>
              </div>
              
              <BrutalButton onClick={handleClose} variant="secondary" className="w-full">完成並關閉</BrutalButton>
            </ModalWrapper>
          );
        };

        const NoteModal = ({ tripId, type, api, onClose }) => {
          const [docId, setDocId] = useState(null);
          const [title, setTitle] = useState('');
          const [notes, setNotes] = useState('');
          const [photoData, setPhotoData] = useState(null);
          
          const [status, setStatus] = useState('');
          const isInitial = useRef(true);
          const latestData = useRef(null);

          const performSave = (data) => {
              if (docId) api.updateNote(docId, data);
              else { const newId = api.addNote(data); setDocId(newId); }
              setStatus('saved');
          };

          useEffect(() => {
              const data = { tripId, type, title, notes, photoData, updatedAt: Date.now() };
              latestData.current = data;

              if (isInitial.current) { isInitial.current = false; return; }
              if (!docId && !title && !notes && !photoData) return;

              setStatus('saving');
              const timer = setTimeout(() => performSave(data), 600);
              return () => clearTimeout(timer);
          }, [title, notes, photoData]);

          const handleClose = () => {
              if (status === 'saving' && latestData.current) performSave(latestData.current);
              onClose();
          };

          const handleFile = (e) => {
            const file = e.target.files[0];
            if (file) resizeImage(file, (base64) => setPhotoData(base64));
          };

          return (
            <ModalWrapper title={type === 'shopping' ? '新增必買項目' : '新增重要資料'} status={status} onClose={handleClose}>
              <BrutalInput label="標題 *" value={title} onChange={e => setTitle(e.target.value)} placeholder="例如：大正感冒藥" />
              <BrutalTextarea label="備註內容" value={notes} onChange={e => setNotes(e.target.value)} placeholder="價格、數量、哪裡買..." />
              
              <div className="mb-6">
                <label className="block font-black text-black mb-2">附加照片</label>
                <div className="border-4 border-black border-dashed p-4 text-center hover:bg-gray-100 transition-colors relative cursor-pointer">
                  <input type="file" accept="image/*" onChange={handleFile} className="absolute inset-0 opacity-0 cursor-pointer z-10" />
                  {photoData ? (
                    <img src={photoData} alt="Preview" className="mx-auto max-h-40 object-contain border-2 border-black shadow-[4px_4px_0_0_#000]" />
                  ) : (
                    <div className="py-4 text-gray-500 font-bold flex flex-col items-center gap-2">
                      <Camera size={32} />
                      點擊上傳或拍攝照片
                    </div>
                  )}
                </div>
              </div>
              
              <BrutalButton onClick={handleClose} variant="secondary" className="w-full">完成並關閉</BrutalButton>
            </ModalWrapper>
          );
        };

        // ==========================================
        // Sub-Views (Tabs)
        // ==========================================
        const TimelineTab = ({ trip, events, api }) => {
          const dates = useMemo(() => getDatesInRange(trip.startDate, trip.endDate), [trip.startDate, trip.endDate]);
          const [selectedDate, setSelectedDate] = useState(dates[0] || trip.startDate);
          const [isEventModalOpen, setIsEventModalOpen] = useState(false);
          const [editingEvent, setEditingEvent] = useState(null);

          const dayEvents = events.filter(e => e.date === selectedDate).sort((a, b) => {
            if (a.orderIndex !== undefined && b.orderIndex !== undefined) return a.orderIndex - b.orderIndex;
            return a.time.localeCompare(b.time);
          });

          const moveEvent = (index, direction) => {
            if (direction === 'up' && index === 0) return;
            if (direction === 'down' && index === dayEvents.length - 1) return;

            const newOrder = [...dayEvents];
            const swapIdx = direction === 'up' ? index - 1 : index + 1;
            [newOrder[index], newOrder[swapIdx]] = [newOrder[swapIdx], newOrder[index]];
            
            const updates = {};
            newOrder.forEach((ev, i) => { updates[ev.id] = { orderIndex: i }; });
            api.updateEventsBulk(updates);
          };

          return (
            <div className="pb-20">
              <div className="flex overflow-x-auto no-scrollbar gap-3 pb-4 mb-4">
                {dates.map((date, idx) => {
                  const isSelected = date === selectedDate;
                  const dayName = new Date(date).toLocaleDateString('zh-TW', { weekday: 'short' });
                  return (
                    <button key={date} onClick={() => setSelectedDate(date)} className={`flex-shrink-0 border-4 border-black px-4 py-2 font-black flex flex-col items-center justify-center shadow-[4px_4px_0_0_#000] active:translate-y-1 active:translate-x-1 active:shadow-none transition-all ${isSelected ? 'bg-black text-white shadow-none translate-y-1 translate-x-1' : 'bg-white text-black'}`}>
                      <span className="text-sm">Day {idx + 1}</span>
                      <span className="text-lg">{date.slice(5)}</span>
                      <span className="text-xs">{dayName}</span>
                    </button>
                  );
                })}
              </div>

              <div className="ml-4 border-l-4 border-black pl-6 relative">
                {dayEvents.length === 0 ? (
                  <div className="text-gray-500 font-bold py-6">這天還沒有安排行程。</div>
                ) : (
                  dayEvents.map((event, idx) => (
                    <div key={event.id} className="mb-8 relative group">
                      <div className="absolute -left-[38px] top-1 w-6 h-6 bg-[#4a044e] border-4 border-black rounded-full z-10"></div>
                      
                      <BrutalBox className="mb-0 group-hover:-translate-y-1 group-hover:-translate-x-1 transition-transform relative" onClick={() => { setEditingEvent(event); setIsEventModalOpen(true); }}>
                        <div className="flex justify-between items-start mb-3">
                          <div className="font-black text-xl bg-[#e5e5e5] px-2 py-1 border-2 border-black inline-block">{event.time}</div>
                          <div className="flex items-center gap-1">
                            <button onClick={(e) => { e.stopPropagation(); moveEvent(idx, 'up'); }} disabled={idx === 0} className="p-1.5 border-2 border-black bg-white hover:bg-gray-100 disabled:opacity-30 disabled:hover:bg-white transition-colors">
                              <ArrowUp size={18} strokeWidth={3} />
                            </button>
                            <button onClick={(e) => { e.stopPropagation(); moveEvent(idx, 'down'); }} disabled={idx === dayEvents.length - 1} className="p-1.5 border-2 border-black bg-white hover:bg-gray-100 disabled:opacity-30 disabled:hover:bg-white transition-colors">
                              <ArrowDown size={18} strokeWidth={3} />
                            </button>
                            <button onClick={(e) => { e.stopPropagation(); if(window.confirm("刪除這個行程？")) api.deleteEvent(event.id); }} className="p-1.5 border-2 border-black bg-red-100 text-red-600 hover:bg-red-200 transition-colors ml-2">
                              <Trash2 size={18} strokeWidth={3} />
                            </button>
                          </div>
                        </div>
                        <h3 className="font-black text-2xl mb-1">{event.title || '未命名行程'}</h3>
                        {event.location && <div className="flex items-center gap-1 font-bold text-gray-700 mb-2"><MapPin size={16} /> {event.location}</div>}
                        {event.notes && <p className="font-bold text-gray-600 bg-gray-50 p-2 border-2 border-black">{event.notes}</p>}
                      </BrutalBox>
                    </div>
                  ))
                )}
              </div>

              <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-40">
                <BrutalButton onClick={() => { setEditingEvent(null); setIsEventModalOpen(true); }} className="w-full text-xl py-4">
                  <Plus strokeWidth={4} /> 新增行程
                </BrutalButton>
              </div>

              {isEventModalOpen && (
                <EventModal event={editingEvent} defaultDate={selectedDate} tripId={trip.id} dayEvents={dayEvents} api={api} onClose={() => setIsEventModalOpen(false)} />
              )}
            </div>
          );
        };

        const LedgerTab = ({ trip, expenses, api }) => {
          const [isExpenseModalOpen, setIsExpenseModalOpen] = useState(false);

          const summary = useMemo(() => {
            const balances = {}; 
            let totalHKD = 0;

            expenses.forEach(exp => {
              const expTotalHKD = parseFloat(exp.amount) * parseFloat(exp.rate);
              totalHKD += expTotalHKD;
              
              const parts = exp.participants || [];
              const numParts = parts.length;
              if (numParts === 0) return;

              const perPerson = expTotalHKD / numParts;
              const settled = exp.settled || []; 

              parts.forEach(p => {
                if (p !== exp.payer && !settled.includes(p)) {
                    balances[exp.payer] = (balances[exp.payer] || 0) + perPerson;
                    balances[p] = (balances[p] || 0) - perPerson;
                }
              });
            });

            const debtors = [];
            const creditors = [];

            for (const [person, balance] of Object.entries(balances)) {
              if (balance < -0.01) debtors.push({ person, amount: -balance });
              else if (balance > 0.01) creditors.push({ person, amount: balance });
            }

            const settlements = [];
            let i = 0, j = 0;
            while (i < debtors.length && j < creditors.length) {
              const debtor = debtors[i];
              const creditor = creditors[j];
              const amount = Math.min(debtor.amount, creditor.amount);

              settlements.push({ from: debtor.person, to: creditor.person, amount });

              debtor.amount -= amount;
              creditor.amount -= amount;

              if (debtor.amount < 0.01) i++;
              if (creditor.amount < 0.01) j++;
            }

            return { totalHKD, balances, settlements };
          }, [expenses]);

          const toggleSettled = (expId, person, currentlySettled, currentSettledList) => {
            const newSettled = currentlySettled 
              ? currentSettledList.filter(p => p !== person) 
              : [...currentSettledList, person];
            api.updateExpense(expId, { settled: newSettled });
          };

          return (
            <div className="pb-20">
              <BrutalBox className="bg-black text-white !border-white shadow-[6px_6px_0_0_#4a044e]">
                <h2 className="font-black text-xl mb-4 flex items-center gap-2"><DollarSign size={24} /> 結算總覽 (HKD)</h2>
                <div className="font-bold mb-4">累積總花費: ${summary.totalHKD.toFixed(2)}</div>
                
                {summary.settlements.length > 0 ? (
                  <div className="bg-white text-black p-4 border-4 border-black shadow-[4px_4px_0_0_#e5e5e5]">
                    <h3 className="font-black text-lg mb-2">誰還欠誰多少：</h3>
                    <ul className="space-y-2">
                      {summary.settlements.map((s, idx) => (
                        <li key={idx} className="flex justify-between font-bold items-center border-b-2 border-dashed border-gray-400 pb-2 last:border-0 last:pb-0">
                          <span className="text-red-600">{s.from}</span>
                          <span className="bg-[#4a044e] text-white px-2 py-0.5 border-2 border-black">應給</span>
                          <span className="text-green-700">{s.to}</span>
                          <span className="font-black text-lg">${s.amount.toFixed(1)}</span>
                        </li>
                      ))}
                    </ul>
                  </div>
                ) : (
                  <div className="font-bold text-gray-300">目前所有帳目已結清或無債務關係！</div>
                )}
              </BrutalBox>

              <h3 className="font-black text-xl mt-8 mb-4 border-l-8 border-[#4a044e] pl-3">所有帳目</h3>
              {expenses.length === 0 ? (
                <div className="text-center p-6 font-bold text-gray-500 border-4 border-dashed border-black">尚無帳目記錄</div>
              ) : (
                expenses.sort((a,b) => b.updatedAt - a.updatedAt).map(exp => {
                  const settled = exp.settled || [];
                  const debtors = exp.participants?.filter(p => p !== exp.payer) || [];

                  return (
                    <BrutalBox key={exp.id} className="!p-4 relative">
                      <button onClick={() => { if(window.confirm("刪除這筆帳目？")) api.deleteExpense(exp.id); }} className="absolute top-2 right-2 p-2 bg-red-100 text-red-600 border-2 border-black active:translate-y-0.5 active:translate-x-0.5 transition-all">
                        <Trash2 size={16} />
                      </button>
                      
                      <div className="flex justify-between items-start mb-2 pr-10">
                        <h4 className="font-black text-lg">{exp.title || '未命名帳目'}</h4>
                        <div className="text-right">
                          <div className="font-black text-xl">{exp.currency} {exp.amount}</div>
                          <div className="text-xs font-bold text-gray-500">(≈ HKD {(exp.amount * exp.rate).toFixed(1)})</div>
                        </div>
                      </div>
                      
                      <div className="bg-gray-100 p-3 border-2 border-black font-bold text-sm mt-3">
                        <div className="mb-2"><span className="text-gray-600">付款人：</span> <span className="bg-black text-white px-2 py-1">{exp.payer}</span></div>
                        
                        {debtors.length > 0 && (
                          <div className="mt-3 pt-3 border-t-2 border-dashed border-gray-400">
                            <div className="text-gray-600 mb-2">分攤狀態 (點擊切換)：</div>
                            <div className="flex flex-wrap gap-2">
                              {debtors.map(d => {
                                const isSettled = settled.includes(d);
                                return (
                                  <button key={d} onClick={() => toggleSettled(exp.id, d, isSettled, settled)} className={`px-2 py-1 border-2 border-black font-black flex items-center gap-1 transition-colors ${isSettled ? 'bg-green-500 text-white shadow-none translate-y-0.5 translate-x-0.5' : 'bg-white shadow-[2px_2px_0_0_#000] active:translate-y-0.5 active:translate-x-0.5 active:shadow-none'}`}>
                                    {isSettled ? '✅ 已付' : '❌ 未付'} - {d}
                                  </button>
                                );
                              })}
                            </div>
                          </div>
                        )}
                      </div>
                    </BrutalBox>
                  );
                })
              )}

              <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-40">
                <BrutalButton onClick={() => setIsExpenseModalOpen(true)} className="w-full text-xl py-4 bg-green-700">
                  <Plus strokeWidth={4} /> 新增帳目
                </BrutalButton>
              </div>

              {isExpenseModalOpen && (
                <ExpenseModal trip={trip} api={api} onClose={() => setIsExpenseModalOpen(false)} />
              )}
            </div>
          );
        };

        const MediaListTab = ({ trip, items, type, api }) => {
          const [isModalOpen, setIsModalOpen] = useState(false);

          return (
            <div className="pb-20">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {items.length === 0 ? (
                  <div className="col-span-full text-center p-8 font-bold text-gray-500 border-4 border-dashed border-black">
                    目前沒有任何{type === 'shopping' ? '必買清單' : '重要資料'}。
                  </div>
                ) : (
                  items.map(item => (
                    <BrutalBox key={item.id} className="!p-0 overflow-hidden relative group">
                      <button onClick={() => api.deleteNote(item.id)} className="absolute top-2 right-2 p-2 bg-red-600 text-white border-2 border-black active:translate-y-0.5 active:translate-x-0.5 transition-all z-10">
                        <Trash2 size={16} />
                      </button>
                      {item.photoData ? (
                        <div className="h-48 border-b-4 border-black relative">
                          <img src={item.photoData} alt={item.title} className="w-full h-full object-cover" />
                        </div>
                      ) : (
                        <div className="h-24 bg-[#e5e5e5] border-b-4 border-black flex items-center justify-center">
                          <ImageIcon className="text-gray-400" size={40} />
                        </div>
                      )}
                      <div className="p-4">
                        <h3 className="font-black text-xl mb-2">{item.title || '未命名項目'}</h3>
                        {item.notes && <p className="font-bold text-gray-700 whitespace-pre-wrap">{item.notes}</p>}
                      </div>
                    </BrutalBox>
                  ))
                )}
              </div>

              <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-40">
                <BrutalButton onClick={() => setIsModalOpen(true)} className="w-full text-xl py-4 bg-[#4a044e]">
                  <Plus strokeWidth={4} /> 新增{type === 'shopping' ? '必買項目' : '重要資料'}
                </BrutalButton>
              </div>

              {isModalOpen && (
                <NoteModal tripId={trip.id} type={type} api={api} onClose={() => setIsModalOpen(false)} />
              )}
            </div>
          );
        };

        // ==========================================
        // Main Views
        // ==========================================
        const HomeView = ({ trips, onOpenTrip, onAddTrip }) => (
          <>
            <div className="p-6 pt-12 pb-8 bg-black text-white shadow-[0_8px_0_0_#4a044e]">
              <h1 className="text-4xl font-black mb-2 tracking-widest">旅行記錄</h1>
              <p className="font-bold text-[#e5e5e5]">永久保存版・工業風旅程雜誌</p>
            </div>
            
            <div className="p-4 mt-6">
              {trips.length === 0 ? (
                <div className="text-center p-10 font-black text-gray-500 border-4 border-dashed border-gray-400 bg-white">
                  目前沒有任何旅程。<br/>點擊下方按鈕開始規劃！
                </div>
              ) : (
                trips.sort((a,b) => new Date(a.startDate) - new Date(b.startDate)).map(trip => (
                  <BrutalBox key={trip.id} onClick={() => onOpenTrip(trip.id)} className="relative overflow-hidden group">
                    <div className="absolute top-0 right-0 bg-[#4a044e] text-white font-black px-3 py-1 border-b-4 border-l-4 border-black translate-x-1 -translate-y-1 group-hover:translate-x-0 group-hover:translate-y-0 transition-transform">
                      GO!
                    </div>
                    <h2 className="text-2xl font-black mb-2 pr-12">{trip.name || '未命名旅程'}</h2>
                    <div className="flex items-center gap-2 font-bold text-gray-700 bg-gray-100 p-2 border-2 border-black inline-flex">
                      <Calendar size={16} />
                      <span>{trip.startDate} ~ {trip.endDate}</span>
                    </div>
                    {trip.participants && trip.participants.length > 0 && (
                      <div className="mt-3 flex gap-1 flex-wrap">
                        {trip.participants.map(p => (
                           <span key={p} className="text-xs font-bold border-2 border-black px-1.5 py-0.5 bg-white">{p}</span>
                        ))}
                      </div>
                    )}
                  </BrutalBox>
                ))
              )}
            </div>

            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-50">
              <BrutalButton onClick={onAddTrip} className="w-full text-xl py-4">
                <Plus strokeWidth={4} /> 新增旅程
              </BrutalButton>
            </div>
          </>
        );

        const TripView = ({ trip, events, expenses, shopping, info, subView, setSubView, api, onBack, onEditTrip }) => {
          const tabs = [
            { id: 'timeline', icon: <MapPin size={20} />, label: '行程' },
            { id: 'ledger', icon: <DollarSign size={20} />, label: '記帳' },
            { id: 'shopping', icon: <ShoppingBag size={20} />, label: '必買' },
            { id: 'info', icon: <Info size={20} />, label: '資料' }
          ];

          return (
            <>
              <TopNav 
                title={trip.name || '未命名旅程'} 
                onBack={onBack}
                rightAction={
                  <button onClick={onEditTrip} className="p-2 border-4 border-black bg-white shadow-[2px_2px_0_0_#000] active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all">
                    <Edit3 size={20} strokeWidth={3} />
                  </button>
                }
              />
              
              <div className="flex overflow-x-auto no-scrollbar border-b-4 border-black bg-white sticky top-[76px] z-30">
                {tabs.map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setSubView(tab.id)}
                    className={`flex-1 flex items-center justify-center gap-2 py-4 px-2 font-black whitespace-nowrap border-r-4 border-black last:border-r-0 transition-colors ${subView === tab.id ? 'bg-[#4a044e] text-white' : 'bg-white text-black hover:bg-gray-100'}`}
                  >
                    {tab.icon} {tab.label}
                  </button>
                ))}
              </div>

              <div className="p-4">
                {subView === 'timeline' && <TimelineTab trip={trip} events={events} api={api} />}
                {subView === 'ledger' && <LedgerTab trip={trip} expenses={expenses} api={api} />}
                {subView === 'shopping' && <MediaListTab trip={trip} items={shopping} type="shopping" api={api} />}
                {subView === 'info' && <MediaListTab trip={trip} items={info} type="info" api={api} />}
              </div>
            </>
          );
        };

        // ==========================================
        // Main Application Root
        // ==========================================
        function App() {
          // 資料由 LocalStorage 管理，確保永不遺失
          const [trips, setTrips] = useLocalStorageData('voyage_trips_local', []);
          const [events, setEvents] = useLocalStorageData('voyage_events_local', []);
          const [expenses, setExpenses] = useLocalStorageData('voyage_expenses_local', []);
          const [notes, setNotes] = useLocalStorageData('voyage_notes_local', []); 
          
          const [currentView, setCurrentView] = useState('home'); 
          const [currentTripId, setCurrentTripId] = useState(null);
          const [tripSubView, setTripSubView] = useState('timeline'); 
          
          const [isTripModalOpen, setIsTripModalOpen] = useState(false);
          const [editingTrip, setEditingTrip] = useState(null);

          // API 包裝器，用於更新 LocalStorage 與 React State
          const api = useMemo(() => ({
              addTrip: (data) => { const id = generateId(); setTrips(p => [...p, {id, ...data}]); return id; },
              updateTrip: (id, data) => setTrips(p => p.map(t => t.id === id ? {...t, ...data} : t)),
              deleteTrip: (id) => setTrips(p => p.filter(t => t.id !== id)),

              addEvent: (data) => { const id = generateId(); setEvents(p => [...p, {id, ...data}]); return id; },
              updateEvent: (id, data) => setEvents(p => p.map(e => e.id === id ? {...e, ...data} : e)),
              deleteEvent: (id) => setEvents(p => p.filter(e => e.id !== id)),
              updateEventsBulk: (updates) => setEvents(p => p.map(e => updates[e.id] ? {...e, ...updates[e.id]} : e)),

              addExpense: (data) => { const id = generateId(); setExpenses(p => [...p, {id, ...data}]); return id; },
              updateExpense: (id, data) => setExpenses(p => p.map(e => e.id === id ? {...e, ...data} : e)),
              deleteExpense: (id) => setExpenses(p => p.filter(e => e.id !== id)),

              addNote: (data) => { const id = generateId(); setNotes(p => [...p, {id, ...data}]); return id; },
              updateNote: (id, data) => setNotes(p => p.map(n => n.id === id ? {...n, ...data} : n)),
              deleteNote: (id) => setNotes(p => p.filter(n => n.id !== id)),
          }), []);

          const currentTrip = trips.find(t => t.id === currentTripId);
          const tripEvents = events.filter(e => e.tripId === currentTripId);
          const tripExpenses = expenses.filter(e => e.tripId === currentTripId);
          const tripShopping = notes.filter(n => n.tripId === currentTripId && n.type === 'shopping');
          const tripInfo = notes.filter(n => n.tripId === currentTripId && n.type === 'info');

          return (
            <div className="min-h-screen text-black font-sans pb-28 relative">
              {currentView === 'home' && (
                <HomeView 
                  trips={trips} 
                  onOpenTrip={(id) => { setCurrentTripId(id); setCurrentView('trip'); setTripSubView('timeline'); }} 
                  onAddTrip={() => { setEditingTrip(null); setIsTripModalOpen(true); }}
                />
              )}

              {currentView === 'trip' && currentTrip && (
                <TripView 
                  trip={currentTrip}
                  events={tripEvents}
                  expenses={tripExpenses}
                  shopping={tripShopping}
                  info={tripInfo}
                  subView={tripSubView}
                  setSubView={setTripSubView}
                  api={api}
                  onBack={() => { setCurrentView('home'); setCurrentTripId(null); }}
                  onEditTrip={() => { setEditingTrip(currentTrip); setIsTripModalOpen(true); }}
                />
              )}

              {isTripModalOpen && (
                <TripModal trip={editingTrip} api={api} onClose={() => setIsTripModalOpen(false)} />
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
